<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống tổng hợp bệnh viện</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 420px; padding: 24px; }
        .login-card { background: #fff; border-radius: 16px; padding: 40px; border: 1px solid #e8ecf0; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
        .logo { width: 80px; height: 80px; object-fit: contain; margin: 0 auto 24px; display: block; background: #f8fafc; border-radius: 12px; }
        .login-title { font-size: 22px; font-weight: 600; color: #374151; text-align: center; margin-bottom: 8px; }
        .login-subtitle { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #e0e4e8; border-radius: 10px; font-size: 15px; }
        .form-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .form-group input::placeholder { color: #9ca3af; }
        .btn-login { width: 100%; padding: 14px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-login:hover { background: #2563eb; }
        .options { display: flex; justify-content: space-between; align-items: center; margin: 16px 0; font-size: 14px; }
        .options label { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #6b7280; }
        .options a { color: #3b82f6; text-decoration: none; }
        .options a:hover { text-decoration: underline; }
        .footer-text { text-align: center; margin-top: 24px; font-size: 13px; color: #9ca3af; }
        .footer-text a { color: #3b82f6; text-decoration: none; }
        .error-msg { font-size: 13px; color: #dc2626; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img class="logo" src="WPF_GiamDinhBaoHiemYTe/Assets/Logo_benh_vien-removebg-preview.png" alt="Logo bệnh viện">
            <h1 class="login-title">HỆ THỐNG TỔNG HỢP BỆNH VIỆN</h1>
            <p class="login-subtitle">Giám định BHYT • Tóm tắt bệnh án • Báo cáo số liệu</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required autocomplete="current-password">
                </div>
                <div class="options">
                    <label><input type="checkbox" name="remember"> Ghi nhớ đăng nhập</label>
                    <a href="#">Quên mật khẩu?</a>
                </div>
                <div class="error-msg" id="errorMsg">Tên đăng nhập hoặc mật khẩu không đúng.</div>
                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>
            <p class="footer-text">© 2025 Zigisoft • <a href="UI_Admin.html">Đăng nhập quản trị</a></p>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var username = document.getElementById('username').value;
            var password = document.getElementById('password').value;
            if (username && password) {
                window.location.href = 'UI_Combined_Mockup.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
